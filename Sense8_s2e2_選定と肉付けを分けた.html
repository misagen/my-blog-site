<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予習テスト：Deep Study 4カラム版</title>
    <style>
        :root {
            --bg-color: #0d1117; --container-bg: #161b22; --text-main: #c9d1d9; --text-muted: #8b949e;
            --accent-blue: #58a6ff; --accent-orange: #f0883e; --accent-green: #3fb950; --accent-red: #ff7b72;
            --border: #30363d; --tree-line: #484f58;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 80px; 
            overflow-x: auto; /* ブラウザ全体の横スクロールを有効化 */
        }

        .container { width: 1700px; margin: 0 auto; } /* テーブル全体の幅を強制固定 */
        
        .header-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; margin-bottom: 20px; width: 100%;
        }
        
        #page-title { font-size: 1.5rem; letter-spacing: 2px; margin: 0; color: #fff; }

        .controls-panel { display: flex; gap: 15px; }
        .control-group {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
        }
        .control-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: bold; }
        .control-group select {
            background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border);
            border-radius: 4px; padding: 2px 5px; font-size: 0.75rem; outline: none; cursor: pointer;
        }

        .level-label { display: inline-block; padding: 8px 16px; font-weight: bold; border-radius: 8px 8px 0 0; font-size: 0.8rem; margin-top: 10px; }
        .bg-mid { background-color: var(--accent-blue); color: #000; }
        .bg-adv { background-color: var(--accent-orange); color: #000; }
        
        table { width: 100%; border-collapse: collapse; background-color: var(--container-bg); border-radius: 0 12px 12px 12px; table-layout: fixed; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 4列の黄金比設定 */
        .col-info { width: 14%; }    /* 基本 */
        .col-context { width: 22%; } /* 例文 */
        .col-nuance { width: 26%; }  /* ニュアンス（移植デザイン用） */
        .col-map { width: 38%; }     /* 関連（画面右外へ） */

        th, td { padding: 18px; border-bottom: 1px solid var(--border); vertical-align: middle; word-break: break-word; }
        th { background-color: #090c10; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; text-align: left; letter-spacing: 0.1em; }

        /* 1列目：基本情報のオートスケール設定 */
        .word-info { --scale: 1; display: flex; flex-direction: column; gap: calc(6px * var(--scale)); width: 100%; }
        .clickable-word-area { display: flex; flex-direction: column; gap: 4px; width: 100%; box-sizing: border-box; cursor: pointer; padding: 6px 8px; margin-left: -8px; border-radius: 6px; transition: 0.2s ease; }
        .clickable-word-area:hover { background-color: rgba(255, 255, 255, 0.08); box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.05); }
        .word-title-container { display: flex; align-items: center; width: 100%; justify-content: flex-start; gap: 8px; }
        .word-title-text { font-size: calc(1.25rem * var(--scale)); font-weight: bold; color: #fff; white-space: nowrap; }
        .pron { color: var(--accent-blue); font-size: calc(0.85rem * var(--scale)); font-family: monospace; }
        .reveal-mean { display: block; border-radius: 6px; padding: calc(10px * var(--scale)); cursor: pointer; text-align: left; font-size: calc(0.9rem * var(--scale)); line-height: 1.5; background: transparent; color: var(--accent-green); font-weight: bold; transition: 0.3s; }
        .reveal-mean.hidden { color: transparent; text-shadow: 0 0 10px rgba(63, 185, 80, 0.6); background-color: #21262d; font-weight: normal; }
        .mean-list { list-style: none; padding-left: 0; margin: 0; }
        .mean-list li { text-indent: -1em; padding-left: 1em; margin-bottom: 2px; }
        .mean-list li::before { content: '▸ '; }

        /* 2列目：例文エリア */
        .usage-tag { font-weight: bold; color: var(--text-muted); font-size: 0.7rem; padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; display: inline-block; margin-bottom: 8px; background: rgba(255,255,255,0.03); }
        .clickable-ex-area { display: block; cursor: pointer; padding: 6px 10px; margin-left: -10px; margin-bottom: 8px; border-radius: 6px; transition: 0.2s; }
        .clickable-ex-area:hover { background-color: rgba(255, 255, 255, 0.08); }
        .ai-ex { color: #fff; font-size: 1rem; font-weight: 500; line-height: 1.4; display: block; margin-bottom: 4px; }
        .trans-text { font-size: 0.85rem; color: var(--accent-blue); line-height: 1.4; font-weight: bold; }
        .reveal-movie { display: inline-block; width: 100%; box-sizing: border-box; padding: 10px; border-left: 3px solid var(--accent-red); background: rgba(255,123,114,0.05); font-style: italic; color: var(--accent-red); cursor: pointer; filter: blur(4px); transition: filter 0.4s, background-color 0.2s; font-size: 0.85rem; }
        .reveal-movie.revealed { filter: blur(0); background: rgba(255,123,114,0.05); }
        .reveal-movie.revealed:hover { background: rgba(255,123,114,0.12); }

        /* 3列目：ニュアンス列（パターンA移植デザイン） */
        .origin-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
        .keyword-tone { color: var(--accent-blue); font-weight: bold; font-size: 0.85rem; }
        .keyword-core { color: var(--text-main); font-size: 0.85rem; font-weight: bold; }
        .story-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }
        .hl-word { color: var(--accent-orange); font-weight: bold; border-bottom: 1px dashed var(--accent-orange); }
        .nuance-box-a { position: relative; margin-top: 15px; border: 1px solid var(--accent-blue); border-radius: 6px; background: rgba(88, 166, 255, 0.05); padding: 12px 15px; }
        .nuance-label-a { position: absolute; top: -10px; left: 12px; background: var(--container-bg); padding: 0 6px; color: var(--accent-blue); font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
        .nuance-text-a { color: #fff; font-size: 0.85rem; font-weight: bold; line-height: 1.5; }

        /* 4列目：関連（ツリー） */
        .map-scroll-container { border: 1px solid var(--border); border-radius: 10px; background: transparent; padding: 15px; overflow-x: auto; }
        .map-wrapper { display: flex; align-items: center; gap: 20px; min-width: max-content; }
        .node { padding: 8px 14px; border-radius: 50px; border: 1px solid var(--tree-line); background: rgba(255,255,255,0.05); font-size: 0.75rem; white-space: nowrap; display: flex; align-items: center; gap: 5px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .node:hover { background-color: rgba(255,255,255,0.15); }
        .root-node { flex-direction: column; align-items: center; justify-content: center; border: 2px solid var(--accent-orange); background: rgba(240, 136, 62, 0.1); color: var(--accent-orange); line-height: 1.2; }
        .root-node:hover { background-color: rgba(240, 136, 62, 0.2); box-shadow: 0 0 12px rgba(240, 136, 62, 0.3); }
        .main-node { color: var(--accent-blue); font-weight: bold; border-color: var(--accent-blue); background: rgba(88, 166, 255, 0.05); }
        .main-node:hover { background-color: rgba(88, 166, 255, 0.15); box-shadow: 0 0 12px rgba(88, 166, 255, 0.3); }
        .branch-container { display: flex; flex-direction: column; gap: 10px; position: relative; padding-left: 25px; }
        .branch-container::before { content: ''; position: absolute; left: 0; top: 15px; bottom: 15px; width: 1px; background: var(--tree-line); }
        .node-row { display: flex; align-items: center; position: relative; }
        .node-row::before { content: ''; position: absolute; left: -25px; top: 50%; width: 25px; height: 1px; background: var(--tree-line); }
        
        .play-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 4px; padding: 0 5px; cursor: pointer; font-size: 0.6rem; height: 1.5em; display: none; } /* 再生ボタン自体は非表示、エリアクリックで対応 */
    </style>
</head>

    document.title = `${movieTitle}_単語リスト`;
    document.getElementById('page-title').innerText = `${movieTitle}：学習単語リスト`;

    let currentVoice = null;
    let availableVoices = [];

    function initVoices() {
        let voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) return;
        const ua = navigator.userAgent;
        const isEdge = ua.includes('Edg');
        const isChrome = ua.includes('Chrome') && !isEdge && !ua.includes('OPR');
        const allowedNames = ["Jenny", "Eric", "Christopher", "Google US English", "Mark"];
        let filteredVoices = voices.filter(v => {
            if (!v.lang.startsWith('en-US')) return false;
            if (v.name.includes('Multilingual') || v.name.includes('David') || v.name.includes('Zira')) return false;
            return allowedNames.some(allowed => v.name.includes(allowed));
        });
        const select = document.getElementById('voice-select');
        select.innerHTML = '';
        availableVoices = [];
        filteredVoices.forEach(v => {
            let isAllowed = false;
            if (isEdge) isAllowed = ["Jenny", "Eric", "Christopher", "Mark"].some(n => v.name.includes(n));
            else if (isChrome) isAllowed = ["Google US English", "Mark"].some(n => v.name.includes(n));
            else isAllowed = v.name.includes("Mark");
            if (isAllowed) {
                availableVoices.push(v);
                const option = document.createElement('option');
                option.value = v.name; option.textContent = v.name; select.appendChild(option);
            }
        });
        let defaultTarget = isEdge ? "Jenny" : isChrome ? "Google US English" : "Mark";
        let defaultVoice = availableVoices.find(v => v.name.includes(defaultTarget));
        if (defaultVoice) { select.value = defaultVoice.name; currentVoice = defaultVoice; }
        select.addEventListener('change', (e) => { currentVoice = availableVoices.find(v => v.name === e.target.value); });
    }
    if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = initVoices;
    initVoices();

    function speak(text, event) {
        if(event) event.stopPropagation();
        window.speechSynthesis.cancel();
        let cleanText = text.replace(/[\(（].*?[\)）]/g, "").trim();
        const msg = new SpeechSynthesisUtterance(cleanText);
        msg.lang = 'en-US'; 
        msg.rate = parseFloat(document.getElementById('rate-select').value);
        if (currentVoice) msg.voice = currentVoice;
        window.speechSynthesis.speak(msg);
    }

    function playMovieLine(element, text, event) {
        if(event) event.stopPropagation();
        if (!element.classList.contains('revealed')) { element.classList.add('revealed'); return; }
        speak(text, event);
    }

    function adjustWordSizes() {
        document.querySelectorAll('.word-info').forEach(infoBlock => {
            const container = infoBlock.querySelector('.clickable-word-area');
            const textEl = infoBlock.querySelector('.word-title-text');
            infoBlock.style.setProperty('--scale', '1');
            const maxWidth = container.clientWidth - 16;
            const textWidth = textEl.scrollWidth;
            if (textWidth > maxWidth && maxWidth > 0) {
                const scale = (maxWidth / textWidth) * 0.95;
                infoBlock.style.setProperty('--scale', scale);
            }
        });
    }
    window.addEventListener('resize', adjustWordSizes);

    function buildTree(nodes) {
        if (!nodes || nodes.length === 0) return '';
        let html = '<div class="branch-container">';
        nodes.forEach(node => {
            let nodeClass = node.isMain ? 'node main-node' : 'node';
            let wordForSpeech = node.text.split('(')[0].trim().replace(/'/g, "\\'");
            html += `<div class="node-row"><div class="${nodeClass}" onclick="speak('${wordForSpeech}', event)">${node.text}</div>`;
            if (node.children) html += buildTree(node.children);
            html += `</div>`;
        });
        html += '</div>';
        return html;
    }

    function createRows(data, containerId) {
        const tbody = document.getElementById(containerId);
        data.forEach(item => {
            const tr = document.createElement('tr');
            const meanArray = Array.isArray(item.mean) ? item.mean : [item.mean];
            const meanHtml = `<ul class="mean-list">` + meanArray.map(m => `<li>${m}</li>`).join('') + `</ul>`;
            
            const movieTransHtml = item.movieTrans ? `<div style="color: var(--text-muted); font-size: 0.8rem; margin-top: 4px;">（訳）${item.movieTrans}</div>` : '';

            tr.innerHTML = `
                <td>
                    <div class="word-info">
                        <div class="clickable-word-area" onclick="speak('${item.word.replace(/'/g, "\\'")}', event)">
                            <div class="word-title-container"><span class="word-title-text">${item.word}</span></div>
                            <div class="pron">${item.pron}</div>
                        </div>
                        <div class="reveal-box reveal-mean" onclick="this.classList.toggle('hidden')">${meanHtml}</div>
                    </div>
                </td>
                <td>
                    <span class="usage-tag">[${item.tag}]</span>
                    <div class="clickable-ex-area" onclick="speak('${item.aiex.replace(/'/g, "\\'")}', event)">
                        <div class="ai-ex">${item.aiex}</div>
                        <div class="trans-text">（訳）${item.aitrans}</div>
                    </div>
                    <div class="reveal-movie" onclick="playMovieLine(this, '${item.movie.replace(/'/g, "\\'")}', event)">
                        "${item.movie}"
                        ${movieTransHtml}
                    </div>
                </td>
                <td>
                    <!-- 3列目：ニュアンス移植デザイン -->
                    <div class="origin-header">
                        <span class="keyword-tone">${item.catchTone}</span>
                        <span class="keyword-core">${item.catchCore}</span>
                    </div>
                    <div class="story-text">${item.originText}</div>
                    <div class="nuance-box-a">
                        <span class="nuance-label-a">💡 ニュアンス</span>
                        <div class="nuance-text-a">${item.nuanceText}</div>
                    </div>
                </td>
                <td>
                    <!-- 4列目：関連マップ -->
                    <div class="map-scroll-container">
                        <div class="map-wrapper">
                            <div class="node root-node" onclick="speak('${item.map.rootMain.split('(')[0].trim().replace(/'/g, "\\'")}', event)">
                                <span class="root-main">${item.map.rootMain}</span>
                                <span class="root-sub">${item.map.rootSub}</span>
                            </div>
                            ${buildTree(item.map.children)}
                        </div>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
        requestAnimationFrame(adjustWordSizes);
    }
    
    createRows(midData, 'mid-list');
    createRows(advData, 'adv-list');
</script>
</body>
</html>
